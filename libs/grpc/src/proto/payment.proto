syntax = "proto3";

package hypercommerce.payment;

service PaymentService {
  rpc GetPaymentStatus (GetPaymentStatusRequest) returns (PaymentStatusResponse);
  rpc GetPaymentByOrder (GetPaymentByOrderRequest) returns (PaymentStatusResponse);
  rpc RefundPayment (RefundPaymentRequest) returns (RefundPaymentResponse);
}

message GetPaymentStatusRequest {
  string payment_id = 1;
}

message GetPaymentByOrderRequest {
  string order_id = 1;
}

message PaymentStatusResponse {
  string payment_id = 1;
  string order_id = 2;
  string status = 3;  // PENDING, PROCESSING, COMPLETED, FAILED, REFUNDED
  string method = 4;  // stripe, vnpay, momo, cod
  int64 amount = 5;   // in cents
  string currency = 6;
  string gateway_transaction_id = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
}

message RefundPaymentRequest {
  string payment_id = 1;
  int64 amount = 2;  // partial refund amount (0 = full refund)
  string reason = 3;
  string requested_by = 4;
}

message RefundPaymentResponse {
  bool success = 1;
  string refund_id = 2;
  string message = 3;
}
