syntax = "proto3";

package hypercommerce.order;

service OrderService {
  rpc GetOrder (GetOrderRequest) returns (OrderResponse);
  rpc GetOrderBatch (GetOrderBatchRequest) returns (GetOrderBatchResponse);
  rpc UpdateOrderStatus (UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
  rpc GetOrdersByUser (GetOrdersByUserRequest) returns (GetOrdersByUserResponse);
  rpc CancelOrder (CancelOrderRequest) returns (CancelOrderResponse);
}

message GetOrderRequest {
  string order_id = 1;
}

message GetOrderBatchRequest {
  repeated string order_ids = 1;
}

message GetOrderBatchResponse {
  repeated OrderResponse orders = 1;
}

message OrderResponse {
  string id = 1;
  string user_id = 2;
  string status = 3;  // PENDING, CONFIRMED, PROCESSING, SHIPPED, DELIVERED, CANCELLED
  int64 total_amount = 4;  // in cents
  string currency = 5;
  repeated OrderItemResponse items = 6;
  string shipping_address_json = 7;
  int64 created_at = 8;
  int64 updated_at = 9;
  string payment_id = 10;
}

message OrderItemResponse {
  string product_id = 1;
  string variant_id = 2;
  int32 quantity = 3;
  int64 unit_price = 4;
  int64 total_price = 5;
}

message UpdateOrderStatusRequest {
  string order_id = 1;
  string status = 2;
  string reason = 3;       // optional reason (for cancellation)
  string updated_by = 4;  // user_id or 'system'
}

message UpdateOrderStatusResponse {
  bool success = 1;
  string order_id = 2;
  string new_status = 3;
}

message GetOrdersByUserRequest {
  string user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
  string status_filter = 4;  // optional status filter
}

message GetOrdersByUserResponse {
  repeated OrderResponse orders = 1;
  int64 total = 2;
  bool has_more = 3;
}

message CancelOrderRequest {
  string order_id = 1;
  string user_id = 2;
  string reason = 3;
}

message CancelOrderResponse {
  bool success = 1;
  string message = 2;
}
