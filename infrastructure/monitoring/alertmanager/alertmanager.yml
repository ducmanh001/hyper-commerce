# Alertmanager configuration
#
# WHY PagerDuty + Slack (not just email)?
# - PagerDuty: on-call rotation + escalation policies. Critical alerts at 3AM
#   need to wake someone up; email is insufficient for P0 incidents.
# - Slack: team visibility. Engineers see warning alerts in context (#alerts-warning)
#   without being paged. Reduces alert fatigue from over-paging.
# - Route tree: critical → PagerDuty (immediate) + Slack, warning → Slack only
#
# Inhibit rules prevent alert storm:
#   If infrastructure is down, suppress application-level alerts that are
#   downstream consequences (don't page for "API slow" if DB is down)

global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Template for Slack messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack-warning'

  routes:
    # Critical: page immediately via PagerDuty + notify Slack
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true  # Also send to Slack

    - match:
        severity: critical
      receiver: 'slack-critical'

    # Business alerts (non-ops): finance/business team channel
    - match:
        team: business
      receiver: 'slack-business'

    # Trust & safety alerts
    - match:
        team: trust_safety
      receiver: 'slack-trust-safety'

    # Warnings: Slack only
    - match:
        severity: warning
      receiver: 'slack-warning'

receivers:
  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: '🔴 [CRITICAL] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Service:* {{ .Labels.service }}
          *Details:* {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        color: '#FF0000'

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_ROUTING_KEY}'
        severity: critical
        description: '{{ .CommonAnnotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          service: '{{ .CommonLabels.service }}'

  - name: 'slack-warning'
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: '🟡 [WARNING] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Service:* {{ .Labels.service }}
          {{ end }}
        color: '#FFA500'

  - name: 'slack-business'
    slack_configs:
      - channel: '#alerts-business'
        send_resolved: true
        title: '📊 [BUSINESS] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}
        color: '#0066CC'

  - name: 'slack-trust-safety'
    slack_configs:
      - channel: '#trust-safety-alerts'
        send_resolved: false
        title: '🛡️ [TRUST & SAFETY] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}
        color: '#9B59B6'

inhibit_rules:
  # If database is down, inhibit upstream service latency alerts
  - source_match:
      alertname: PostgresDown
    target_match_re:
      alertname: HighLatency.*
    equal: ['environment']

  # If Redis is down, inhibit rate-limiter / cache miss alerts
  - source_match:
      alertname: RedisDown
    target_match_re:
      alertname: (RateLimitError|CacheMissRate).*
    equal: ['environment']

  # If a critical fires, suppress the warning version of the same alert
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service']
