# Grafana Loki — single binary mode for development/self-hosted production
#
# WHY LOKI over ELK (Elasticsearch + Logstash + Kibana)?
# 1. Label-based indexing: Same model as Prometheus (service, container, level) — unified querying
# 2. Cheaper storage: Only indexes labels, compresses log bodies → 10x cheaper than ES for plain logs
# 3. Native Grafana: Explore tab, Loki datasource, LogQL correlates directly with metrics panels
# 4. No Logstash: Promtail (sidecar) replaces Logstash — simpler, lighter, purpose-built
# 5. Retention: 30-day log retention via table_manager is trivial vs ES ILM complexity
#
# Trade-off: Full-text search is slower than ES. Acceptable because we use structured logs
# with level/service labels — most queries filter by label, not by body content.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://alertmanager:9093

# Retention: 30 days
limits_config:
  retention_period: 720h  # 30 days

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h

analytics:
  reporting_enabled: false
