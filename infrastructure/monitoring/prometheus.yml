global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Application Services ──────────────────────────────────
  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:3001"]
    metrics_path: /metrics

  - job_name: "feed-service"
    static_configs:
      - targets: ["feed-service:3002"]
    metrics_path: /metrics

  - job_name: "order-service"
    static_configs:
      - targets: ["order-service:3003"]
    metrics_path: /metrics

  - job_name: "inventory-service"
    static_configs:
      - targets: ["inventory-service:3004"]
    metrics_path: /metrics

  - job_name: "search-service"
    static_configs:
      - targets: ["search-service:3005"]
    metrics_path: /metrics

  - job_name: "live-service"
    static_configs:
      - targets: ["live-service:3006"]
    metrics_path: /metrics

  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:3007"]
    metrics_path: /metrics

  - job_name: "analytics-service"
    static_configs:
      - targets: ["analytics-service:3009"]
    metrics_path: /metrics

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:3008"]
    metrics_path: /metrics

  - job_name: "ai-service"
    static_configs:
      - targets: ["ai-service:3010"]
    metrics_path: /metrics

  - job_name: "admin-service"
    static_configs:
      - targets: ["admin-service:3011"]
    metrics_path: /metrics

  - job_name: "ads-service"
    static_configs:
      - targets: ["ads-service:3012"]
    metrics_path: /metrics

  - job_name: "subscription-service"
    static_configs:
      - targets: ["subscription-service:3013"]
    metrics_path: /metrics

  # ── Infrastructure Exporters ──────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # ── Loki self-metrics ─────────────────────────────────────
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics

  # ── Blackbox probes (external payment gateways) ──────────
  # WHY probe payment gateways? Detect degradation BEFORE customers do.
  - job_name: "blackbox-payment-gateways"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://www.vnpayment.vn
          - https://payment.momo.vn
          - https://api.stripe.com
        labels:
          group: payment-gateways
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
