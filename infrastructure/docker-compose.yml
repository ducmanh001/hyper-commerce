version: '3.9'

# ============================================================
# HYPERCOMMERCE — Complete Infrastructure Stack
# Services: PostgreSQL (Citus), Cassandra, Redis Cluster,
#           Kafka, Elasticsearch, ClickHouse, Pinecone-compatible
#           vector DB (Qdrant), Jaeger, Prometheus, Grafana
# ============================================================

networks:
  hypercommerce:
    driver: bridge

volumes:
  postgres_data:
  cassandra_data:
  elasticsearch_data:
  clickhouse_data:
  qdrant_data:
  kafka_data:
  zookeeper_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:

services:
  # ── PostgreSQL (Citus) ─────────────────────────────────────
  # Sharded relational DB for: users, orders, payments
  # In dev: single node. Prod: 32-node Citus cluster
  postgres:
    image: citusdata/citus:12.1
    container_name: hc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hypercommerce
      POSTGRES_USER: hc_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hypercommerce_dev}
      # Enable logical replication for CDC
      POSTGRES_INITDB_ARGS: '--wal-level=logical'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
        -c shared_preload_libraries=citus
        -c max_connections=500
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c wal_buffers=32MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=100
    networks:
      - hypercommerce
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hc_user -d hypercommerce']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cassandra ─────────────────────────────────────────────
  # Write-optimized LSM-tree for: feed, comments, activity log
  cassandra:
    image: cassandra:4.1
    container_name: hc-cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: HyperCommerce
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: '1G'
      HEAP_NEWSIZE: '256M'
    ports:
      - '9042:9042'
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./scripts/cassandra-init.cql:/docker-entrypoint-initdb.d/init.cql
    networks:
      - hypercommerce
    healthcheck:
      test: ['CMD', 'cqlsh', '-e', 'DESCRIBE KEYSPACES']
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Redis ─────────────────────────────────────────────────
  # Cluster mode in prod; standalone in dev for simplicity
  # Handles: cache, sessions, rate limiting, pub/sub, Lua atomic ops
  redis:
    image: redis:7.2-alpine
    container_name: hc-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 2gb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --tcp-keepalive 60
        --timeout 300
    ports:
      - '6379:6379'
    networks:
      - hypercommerce
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Zookeeper (for Kafka) ─────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: hc-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - hypercommerce

  # ── Kafka ─────────────────────────────────────────────────
  # 1 broker in dev; 3 brokers in prod (RF=3, min.insync.replicas=2)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: hc-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12 # 12 partitions per topic
      KAFKA_LOG_RETENTION_HOURS: 168 # 7 days
      KAFKA_COMPRESSION_TYPE: snappy
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      # Idempotent producer defaults
      KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION: 5
    ports:
      - '9092:9092'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - hypercommerce
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Kafka UI ───────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: hc-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - '8080:8080'
    networks:
      - hypercommerce

  # ── Elasticsearch ─────────────────────────────────────────
  # Full-text + kNN vector search
  # BM25 for keyword, HNSW for vector (768-dim CLIP embeddings)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: hc-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=hypercommerce
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - '9200:9200'
      - '9300:9300'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - hypercommerce
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Kibana ───────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: hc-kibana
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    networks:
      - hypercommerce

  # ── ClickHouse ───────────────────────────────────────────
  # OLAP columnar DB for analytics, dashboards, ML training data
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: hc-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: hypercommerce
      CLICKHOUSE_USER: hc_analytics
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-analytics_dev}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - '8123:8123' # HTTP interface
      - '9000:9000' # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - hypercommerce
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # ── Qdrant (Vector DB) ────────────────────────────────────
  # Approx kNN for product/user embeddings
  # Alternative: Pinecone (managed), Weaviate, Milvus
  qdrant:
    image: qdrant/qdrant:v1.8.3
    container_name: hc-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hypercommerce

  # ── Jaeger (Distributed Tracing) ─────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: hc-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # UI
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
    networks:
      - hypercommerce

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: hc-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - hypercommerce

  # ── Grafana ──────────────────────────────────────────────
  # WHY 10.3.0: stable LTS, has Grafana Scenes plugin API needed for
  # real-time panels. 10.x+ required for nested folders provisioning.
  grafana:
    image: grafana/grafana:10.3.0
    container_name: hc-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - postgres
      - clickhouse
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-hypercommerce_dev}
      # grafana-clickhouse-datasource: ClickHouse OLAP for analytics panels
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 5s
      GF_UNIFIED_ALERTING_ENABLED: 'true'
      # Send alerts to PagerDuty/Slack in prod via env vars
      GF_SMTP_ENABLED: ${GF_SMTP_ENABLED:-false}
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning: datasources + dashboard folder scanner
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      # Actual dashboard JSON files
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    ports:
      - '3001:3000'
    networks:
      - hypercommerce
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Application Services ───────────────────────────────────

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: hc-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: user-service
      PORT: 3001
    ports:
      - '3001:3001'
    networks:
      - hypercommerce

  feed-service:
    build:
      context: .
      dockerfile: apps/feed-service/Dockerfile
    container_name: hc-feed-service
    restart: unless-stopped
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: feed-service
      PORT: 3002
    ports:
      - '3002:3002'
    networks:
      - hypercommerce

  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    container_name: hc-order-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: order-service
      PORT: 3003
    ports:
      - '3003:3003'
    networks:
      - hypercommerce

  inventory-service:
    build:
      context: .
      dockerfile: apps/inventory-service/Dockerfile
    container_name: hc-inventory-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: inventory-service
      PORT: 3004
    ports:
      - '3004:3004'
    networks:
      - hypercommerce

  search-service:
    build:
      context: .
      dockerfile: apps/search-service/Dockerfile
    container_name: hc-search-service
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: search-service
      PORT: 3005
    ports:
      - '3005:3005'
    networks:
      - hypercommerce

  live-service:
    build:
      context: .
      dockerfile: apps/live-service/Dockerfile
    container_name: hc-live-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: live-service
      PORT: 3006
    ports:
      - '3006:3006'
    networks:
      - hypercommerce

  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    container_name: hc-payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: payment-service
      PORT: 3007
    ports:
      - '3007:3007'
    networks:
      - hypercommerce

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: hc-notification-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: notification-service
      PORT: 3008
    ports:
      - '3008:3008'
    networks:
      - hypercommerce

  analytics-service:
    build:
      context: .
      dockerfile: apps/analytics-service/Dockerfile
    container_name: hc-analytics-service
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_started
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: analytics-service
      PORT: 3009
    ports:
      - '3009:3009'
    networks:
      - hypercommerce

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    container_name: hc-ai-service
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      SERVICE_NAME: ai-service
      PORT: 3010
    ports:
      - '3010:3010'
    networks:
      - hypercommerce
  # ── Ads Service ─────────────────────────────────────────────
  # Revenue stream: CPC/CPM sponsored product ads
  # WHY SEPARATE SERVICE: Auction logic is CPU-intensive (scoring N candidates);
  # isolating prevents ad latency from affecting checkout or search.
  ads-service:
    build:
      context: ..
      dockerfile: apps/ads-service/Dockerfile
    container_name: hc-ads-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: ads-service
      PORT: 3012
      DATABASE_URL: postgresql://hc_user:${POSTGRES_PASSWORD:-hypercommerce_dev}@postgres:5432/hypercommerce
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - '3012:3012'
    networks:
      - hypercommerce

  # ── Subscription Service ────────────────────────────────────
  # Revenue stream: Recurring MRR from seller plans (BASIC/PROFESSIONAL/ENTERPRISE)
  # WHY SEPARATE: Stripe webhooks require rawBody middleware; co-locating with other
  # services would mean adding rawBody to all services. Isolation is cleaner.
  subscription-service:
    build:
      context: ..
      dockerfile: apps/subscription-service/Dockerfile
    container_name: hc-subscription-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: subscription-service
      PORT: 3013
      DATABASE_URL: postgresql://hc_user:${POSTGRES_PASSWORD:-hypercommerce_dev}@postgres:5432/hypercommerce
      REDIS_URL: redis://redis:6379
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dev_placeholder}
      NODE_ENV: production
    ports:
      - '3013:3013'
    networks:
      - hypercommerce

  # ── Web (Next.js Storefront) ────────────────────────────────
  # Customer-facing revenue-generating website
  # WHY standalone output: Copies only production-needed files → smaller Docker image
  # WHY depends on search/order/user: BFF API routes call these services
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: hc-web
    restart: unless-stopped
    depends_on:
      - search-service
      - order-service
      - user-service
      - ads-service
    environment:
      NODE_ENV: production
      PORT: 3000
      SEARCH_SERVICE_URL: http://search-service:3005
      ORDER_SERVICE_URL: http://order-service:3003
      USER_SERVICE_URL: http://user-service:3001
      ADS_SERVICE_URL: http://ads-service:3012
      ADMIN_SERVICE_URL: http://admin-service:3011
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_in_production}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal_dev_token}
    ports:
      - '3000:3000'
    networks:
      - hypercommerce

  # ── Admin Service ─────────────────────────────────────────
  # WHY SEPARATE FROM API GATEWAY?
  # - Reads from PostgreSQL read replica (heavy aggregations)
  # - Different auth: internal JWT (longer TTL, admin roles)
  # - Should NOT be reachable from public internet
  # - CPU/memory isolation from customer-facing services
  admin-service:
    build:
      context: ..
      dockerfile: apps/admin-service/Dockerfile
    container_name: hc-admin-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SERVICE_NAME: admin-service
      ADMIN_PORT: 3011
      # Separate JWT secret — never shared with customer-facing services
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-admin_dev_secret_change_in_prod}
      ADMIN_JWT_EXPIRY: 8h
    ports:
      # Bind to localhost only in prod via nginx config
      - '127.0.0.1:3011:3011'
    networks:
      - hypercommerce

  # ═══════════════════════════════════════════════════════════
  # OBSERVABILITY STACK
  # ═══════════════════════════════════════════════════════════

  # ── Loki (Log Aggregation) ─────────────────────────────────
  # WHY LOKI over ELK: Label-based indexing (same as Prometheus labels),
  # 10x cheaper storage (compressed streams), native Grafana integration,
  # no Logstash pipeline complexity.
  loki:
    image: grafana/loki:2.9.0
    container_name: hc-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    ports:
      - '3100:3100'
    networks:
      - hypercommerce
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3100/ready || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Promtail (Log Shipping) ────────────────────────────────
  # Tails Docker container logs and ships to Loki.
  # Needs access to Docker socket for container discovery.
  promtail:
    image: grafana/promtail:2.9.0
    container_name: hc-promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - '9080:9080'
    networks:
      - hypercommerce

  # ── Node Exporter (Host Metrics) ───────────────────────────
  # WHY: Container metrics (cAdvisor) don't include host-level disk I/O,
  # network bandwidth, or CPU steal time. Node Exporter fills that gap.
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: hc-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - '9100:9100'
    networks:
      - hypercommerce
    pid: host

  # ── cAdvisor (Container Metrics) ───────────────────────────
  # WHY: Per-container CPU/memory/network. Maps to Kubernetes pod metrics.
  # Essential for capacity planning and identifying hot services.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: hc-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - '8081:8080'
    networks:
      - hypercommerce

  # ── Alertmanager ─────────────────────────────────────────
  # Routes alerts to Slack (warnings) and PagerDuty (critical).
  # Inhibit rules prevent alert storm when infra is down.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hc-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    ports:
      - '9093:9093'
    networks:
      - hypercommerce
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/placeholder}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-pagerduty_dev_key}

  # ── Blackbox Exporter (External Probe) ─────────────────────
  # Probes HTTP endpoints for availability. Used to monitor:
  # - Payment gateways (VNPay, MoMo, Stripe) from our perspective
  # - API health endpoints of critical services
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: hc-blackbox
    restart: unless-stopped
    ports:
      - '9115:9115'
    networks:
      - hypercommerce

  # ── PostgreSQL Exporter ────────────────────────────────────
  # Exports pg_stat_* metrics to Prometheus: query times, locks, bloat
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: hc-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://hc_user:${POSTGRES_PASSWORD:-hypercommerce_dev}@postgres:5432/hypercommerce?sslmode=disable
    ports:
      - '9187:9187'
    networks:
      - hypercommerce

  # ── Redis Exporter ─────────────────────────────────────────
  # Exports Redis metrics: memory usage, hit rate, commands/sec, connected clients
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: hc-redis-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - '9121:9121'
    networks:
      - hypercommerce
