# ============================================================
# NGINX — Edge Gateway for HYPERCOMMERCE
# ============================================================
#
# WHY NGINX instead of alternatives:
#
# vs Kong API Gateway:
#   ✅ NGINX: Stateless config (files), no DB dependency, instant restart
#   ❌ Kong: Requires PostgreSQL/Cassandra for plugin state — adds infra dep
#   ❌ Kong: Plugin overhead adds ~2ms per request at scale
#
# vs AWS ALB + API Gateway:
#   ✅ NGINX: Full control over ModSecurity WAF rules
#   ✅ NGINX: Rate limiting at L7 without per-request AWS API cost
#   ❌ AWS ALB: No L7 WAF without AWS WAF ($5/rule/month + $0.60/1M requests)
#
# vs Traefik:
#   ✅ NGINX: Mature ecosystem, proven at 10M+ RPS (Cloudflare uses it)
#   ✅ NGINX: Built-in rate limiting with shared memory zones (no Redis needed)
#   ❌ Traefik: Dynamic config is powerful but harder to audit for security
#
# vs Caddy:
#   ✅ NGINX: Fine-grained connection/buffer tuning
#   ❌ Caddy: Fewer knobs for high-performance tuning
# ============================================================

# One worker per CPU core — avoids context switching overhead
# vs multi-threaded: event-loop model handles 50K+ concurrent with 1 core
worker_processes auto;
worker_cpu_affinity auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Maximum open file descriptors per worker
# Linux default is 1024 — increase to handle many concurrent connections
worker_rlimit_nofile 65535;

events {
    # epoll: Linux kernel's most efficient event mechanism
    # WHY NOT select/poll: O(n) vs epoll's O(1) for active connections
    use epoll;

    # Max connections per worker = worker_connections × worker_processes
    # 4 workers × 16384 = 65536 concurrent connections
    worker_connections 16384;

    # Accept multiple connections per epoll wakeup
    # Improves throughput under high connection rate (SYN flood protection too)
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ============================================================
    # Logging with structured JSON for log aggregation (Loki/ELK)
    # ============================================================
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"correlation_id":"$http_x_correlation_id",'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer"'
        '}';

    access_log /var/log/nginx/access.log json_combined buffer=16k flush=5s;

    # ============================================================
    # Performance: sendfile, TCP optimizations
    # ============================================================
    # sendfile: kernel-space file transfer (skip user space copy)
    # WHY NOT off: doubles CPU usage for static file serving
    sendfile on;

    # tcp_nopush: batch TCP packets (Nagle algorithm friendly)
    # Combine sendfile + tcp_nopush: full-size packets for large responses
    tcp_nopush on;

    # tcp_nodelay: disable Nagle for small packets (API responses < 1KB)
    # WHY: API JSON responses shouldn't wait 200ms for Nagle flush
    tcp_nodelay on;

    # Keep-alive: reuse TCP connections
    # WHY: 3-way handshake costs ~1 RTT (~10ms) — reuse saves this per request
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ============================================================
    # Buffer sizing
    # Prevents temp file writes for typical API responses
    # ============================================================
    client_body_buffer_size    128k;
    client_max_body_size       50m;   # Allow product image uploads
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;
    output_buffers             1 32k;
    postpone_output            1460;  # One TCP segment

    # ============================================================
    # Gzip: compress API JSON responses
    # WHY: 10KB JSON → ~2KB gzip = 80% bandwidth reduction
    # WHY NOT Brotli here: requires separate module compile
    # (Brotli is used at Cloudflare edge upstream of NGINX)
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;            # Balance: 4 = fast + good ratio
    gzip_buffers 16 8k;
    gzip_min_length 256;          # Don't compress small responses (overhead > gain)
    gzip_types
        application/json
        application/javascript
        text/plain text/css text/xml text/javascript
        application/x-font-ttf font/opentype image/svg+xml;

    # ============================================================
    # Rate Limiting Zones (shared memory between workers)
    # ============================================================
    # Global per-IP rate limit — blocks brute force, credential stuffing
    limit_req_zone $binary_remote_addr zone=per_ip:20m rate=100r/s;

    # Per-user rate limit (from JWT sub claim extracted in auth header)
    # Prevents a single compromised account from abusing APIs
    map $http_authorization $api_client_id {
        default $binary_remote_addr;
        "~^Bearer\s(.+)$" $1;
    }
    limit_req_zone $api_client_id zone=per_user:20m rate=50r/s;

    # Strict limit for auth endpoints (login, register, OTP)
    # 5 r/m = 1 attempt per 12 seconds per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Webhook endpoints — separate zone with burst for retries
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;

    # Write endpoints (orders, cart, payments)
    limit_req_zone $binary_remote_addr zone=write_limit:10m  rate=30r/m;

    # Search endpoints — higher allowance
    limit_req_zone $binary_remote_addr zone=search_limit:20m rate=120r/m;

    # General API limit
    limit_req_zone $binary_remote_addr zone=ip_limit:20m     rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

    # ============================================================
    # Upstream Health Checks (NGINX Plus feature; oss via health_check module)
    # ============================================================
    include /etc/nginx/conf.d/upstream.conf;

    # ============================================================
    # Server Blocks
    # ============================================================

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        server_name api.hypercommerce.vn hypercommerce.vn;

        include /etc/nginx/conf.d/ssl.conf;
        include /etc/nginx/conf.d/security.conf;

        # --------------------------------------------------------
        # Order Service routes
        # --------------------------------------------------------
        location /api/v1/orders {
            limit_req zone=per_user burst=20 nodelay;
            limit_conn per_ip_conn 20;
            proxy_pass http://order_upstream;
            include /etc/nginx/conf.d/proxy.conf;
        }

        # --------------------------------------------------------
        # Payment Service — strict limits, no cache
        # --------------------------------------------------------
        location /api/v1/payments {
            limit_req zone=per_user burst=5 nodelay;
            limit_conn per_ip_conn 5;
            proxy_pass http://payment_upstream;
            include /etc/nginx/conf.d/proxy.conf;
            # No caching for payment endpoints
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # Payment webhooks — Stripe/VNPay/MoMo call these
        location /api/v1/webhooks {
            limit_req zone=webhook_limit burst=50 nodelay;
            proxy_pass http://payment_upstream;
            include /etc/nginx/conf.d/proxy.conf;
        }

        # --------------------------------------------------------
        # User / Auth — strict rate limiting
        # --------------------------------------------------------
        location /api/v1/auth {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://user_upstream;
            include /etc/nginx/conf.d/proxy.conf;
            # No cache for auth endpoints
            add_header Cache-Control "no-store";
        }

        location /api/v1/users {
            limit_req zone=per_user burst=30 nodelay;
            proxy_pass http://user_upstream;
            include /etc/nginx/conf.d/proxy.conf;
        }

        # --------------------------------------------------------
        # Search — public, cacheable for 5s (trending)
        # --------------------------------------------------------
        location /api/v1/search {
            limit_req zone=per_ip burst=100 nodelay;
            proxy_pass http://search_upstream;
            include /etc/nginx/conf.d/proxy.conf;

            # Cache search results briefly (5 seconds) — reduces ES load
            # WHY 5s not longer: search results change (new products, live streams)
            proxy_cache search_cache;
            proxy_cache_valid 200 5s;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # --------------------------------------------------------
        # Inventory — internal, protected
        # --------------------------------------------------------
        location /api/v1/inventory {
            limit_req zone=per_user burst=30 nodelay;
            proxy_pass http://inventory_upstream;
            include /etc/nginx/conf.d/proxy.conf;
        }

        # --------------------------------------------------------
        # Notifications
        # --------------------------------------------------------
        location /api/v1/notifications {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass http://notification_upstream;
            include /etc/nginx/conf.d/proxy.conf;
        }

        # --------------------------------------------------------
        # AI Recommendations — cached aggressively (1 minute)
        # --------------------------------------------------------
        location /api/v1/recommendations {
            limit_req zone=per_user burst=10 nodelay;
            proxy_pass http://ai_upstream;
            include /etc/nginx/conf.d/proxy.conf;
            proxy_cache search_cache;
            proxy_cache_valid 200 60s;
        }

        # --------------------------------------------------------
        # Live Streaming — WebSocket upgrade
        # --------------------------------------------------------
        location /api/v1/live {
            limit_req zone=per_user burst=10 nodelay;
            proxy_pass http://live_upstream;
            include /etc/nginx/conf.d/proxy.conf;
        }

        location /ws {
            proxy_pass http://live_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;   # Keep WebSocket open 1 hour
            proxy_send_timeout 3600s;
        }

        # --------------------------------------------------------
        # Analytics ingest — high volume, async write
        # --------------------------------------------------------
        location /api/v1/analytics {
            limit_req zone=per_ip burst=200 nodelay;
            proxy_pass http://analytics_upstream;
            include /etc/nginx/conf.d/proxy.conf;
        }

        # --------------------------------------------------------
        # Feed
        # --------------------------------------------------------
        location /api/v1/feed {
            limit_req zone=per_user burst=20 nodelay;
            proxy_pass http://feed_upstream;
            include /etc/nginx/conf.d/proxy.conf;
            proxy_cache search_cache;
            proxy_cache_valid 200 10s;
        }

        # --------------------------------------------------------
        # Health check endpoint (for load balancer probes)
        # --------------------------------------------------------
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # --------------------------------------------------------
        # Block common attack paths
        # --------------------------------------------------------
        location ~ /\. { deny all; }
        location ~* \.(env|git|htaccess|htpasswd|sql|log)$ { deny all; }

        # --------------------------------------------------------
        # Static assets (admin SPA, Swagger UI)
        # --------------------------------------------------------
        location /static/ {
            alias /var/www/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /swagger {
            proxy_pass http://order_upstream;
            include /etc/nginx/conf.d/proxy.conf;
        }

        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"statusCode":429,"message":"Too Many Requests","retryAfter":1}';
        }

        error_page 502 503 504 @gateway_error;
        location @gateway_error {
            default_type application/json;
            return 503 '{"statusCode":503,"message":"Service Temporarily Unavailable"}';
        }
    }
}
