# ============================================================
# SSL/TLS Configuration for HYPERCOMMERCE
#
# WHY TLS 1.3 only (+ TLS 1.2 for older clients)?
#   TLS 1.3: 0-RTT for resumed sessions (saves 1 RTT = ~10ms for repeat visitors)
#   TLS 1.3: Perfect Forward Secrecy mandatory (not optional like in 1.2)
#   TLS 1.2: Still required for ~3% of clients (older Android, IE11)
#
# WHY NOT TLS 1.0/1.1?
#   POODLE, BEAST, CRIME attacks target TLS 1.0/1.1
#   PCI DSS 3.2.1 mandates disabling TLS 1.0/1.1 for payment systems
#
# WHY Let's Encrypt + Certbot?
#   Free, automated renewal
#   Trusted by all major browsers
#   Alternative: AWS ACM (simpler with ALB, but NGINX needs file-based cert)
# ============================================================

ssl_certificate     /etc/nginx/ssl/fullchain.pem;
ssl_certificate_key /etc/nginx/ssl/privkey.pem;

# TLS protocol versions
ssl_protocols TLSv1.2 TLSv1.3;

# Cipher suites — only strong ciphers
# WHY this specific order?
#   ECDHE: Perfect Forward Secrecy (each session uses new ephemeral key)
#   AES-256-GCM: AEAD (authenticated encryption) — immune to padding oracle
#   ChaCha20-Poly1305: Hardware-friendly for mobile (no AES-NI required)
ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

# WHY ssl_prefer_server_ciphers off for TLS 1.3?
#   TLS 1.3 doesn't have server preference — client and server negotiate
#   Keeping on for TLS 1.2 fallback to enforce our cipher order
ssl_prefer_server_ciphers on;

# Session resumption — reduces full TLS handshake for returning clients
# WHY session tickets vs session cache?
#   Session tickets: stateless (server sends encrypted blob to client)
#   Session cache: stateful (server stores session state in memory)
#   Tickets easier for multiple servers (no shared session store needed)
#   BUT: tickets leak session key if ticket_key is compromised
#   Rotate ticket keys every 24h
ssl_session_tickets on;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;

# OCSP Stapling — server fetches and caches cert revocation status
# WHY: Without stapling, browser must do OCSP request → +100ms for first request
# With stapling: revocation check bundled in handshake, no extra RTT
ssl_stapling on;
ssl_stapling_verify on;
ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# HSTS — tell browsers to always use HTTPS
# max-age=63072000 = 2 years
# includeSubDomains: applies to *.hypercommerce.vn
# preload: submit to HSTS preload list (browsers hardcode HTTPS for domain)
# WHY NOT shorter max-age? Short max-age means HTTP downgrade is possible for
# users who haven't visited recently
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Diffie-Hellman parameters for DHE cipher suites
# WHY 2048 bit minimum? 1024 bit is broken (Logjam attack)
ssl_dhparam /etc/nginx/ssl/dhparam.pem;

# ECDH curve — P-384 for extra security (vs P-256)
# WHY P-384? NSA Suite B requirement for top-secret data
# P-256 is fine for most; P-384 for payment data
ssl_ecdh_curve secp384r1;
