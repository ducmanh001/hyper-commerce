# ============================================================
# HYPERCOMMERCE — Main API Server Block
# Routes all /v1/* API traffic to microservices
# ============================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.hypercommerce.vn;

    # ── TLS ───────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── CORS ──────────────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin ~* "^https://(hypercommerce\.vn|app\.hypercommerce\.vn|localhost:[0-9]+)$") {
        set $cors_origin $http_origin;
    }

    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $cors_origin;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Idempotency-Key, X-Request-ID";
        add_header Access-Control-Max-Age 86400;
        add_header Content-Length 0;
        return 204;
    }

    add_header Access-Control-Allow-Origin $cors_origin always;

    # ── WAF ───────────────────────────────────────────────────
    if ($is_sql_injection) { return 403 '{"error":"Forbidden"}'; }
    if ($is_path_traversal) { return 403 '{"error":"Forbidden"}'; }

    # ── Correlation ID propagation ────────────────────────────
    set $request_id $http_x_request_id;
    if ($request_id = "") {
        set $request_id $request_id;
    }
    add_header X-Request-ID $request_id always;
    proxy_set_header X-Request-ID $request_id;

    # ── Common proxy headers ──────────────────────────────────
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";  # Enable keepalive to upstreams

    # ── Health check (no rate limit) ──────────────────────────
    location /health {
        return 200 '{"status":"ok","layer":"nginx"}';
        add_header Content-Type application/json;
    }

    # ══════════════════════════════════════════════════════════
    # MỌI REQUEST đều đi qua Express API Gateway
    # Gateway chịu trách nhiệm:
    #   1. Verify JWT + RBAC
    #   2. Business logic / DB query
    #   3. Delegate sang NestJS services khi cần (nội bộ Docker)
    #
    # NestJS services KHÔNG được expose ra ngoài.
    # ══════════════════════════════════════════════════════════

    # Auth — rate limit nghiêm ngặt (chống brute-force)
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID    $request_id;
        proxy_read_timeout 10s;
    }

    # Payment webhooks — rate limit rộng (Stripe/VNPay gọi nhiều)
    location ~ ^/api/payments/webhook {
        limit_req zone=webhook_limit burst=500 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID    $request_id;
        proxy_read_timeout 30s;
    }

    # Write endpoints (orders, cart, payments) — rate limit vừa
    location ~ ^/api/(orders|cart|payments) {
        limit_req zone=write_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID    $request_id;
        proxy_set_header   Authorization   $http_authorization;
        proxy_read_timeout 30s;
    }

    # Search — cache tại NGINX (giảm tải gateway)
    location ~ ^/api/search {
        limit_req zone=search_limit burst=100 nodelay;

        proxy_cache        search_cache;
        proxy_cache_key    "$request_uri";
        proxy_cache_valid  200 5m;
        proxy_cache_bypass $http_authorization;  # Logged-in: bypass cache (personalized)
        add_header         X-Cache-Status $upstream_cache_status always;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID    $request_id;
        proxy_read_timeout 5s;
    }

    # WebSocket — Socket.IO live streaming (long-lived connection)
    location /socket.io/ {
        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Tất cả /api/* còn lại
    location /api/ {
        limit_req zone=ip_limit burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID    $request_id;
        proxy_set_header   Authorization   $http_authorization;
        proxy_read_timeout 30s;
    }

    # ── Default ───────────────────────────────────────────────
    location / {
        return 404 '{"error":"Not Found","hint":"Use /api/ prefix"}';
        add_header Content-Type application/json;
    }
}
