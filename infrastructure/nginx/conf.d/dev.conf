# ============================================================
# NGINX Dev Config — HTTP only (no SSL), port 80
# Production: dùng api.conf (HTTPS, port 443)
#
# Luồng: Browser → NGINX:80 → api-gateway:4000
#                            → web:3000
# ============================================================

# Rate limit zones (Redis thay thế khi scale)
limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:20m   rate=120r/m;
limit_req_zone $binary_remote_addr zone=write_limit:10m rate=30r/m;

# Upstream: Express API Gateway (handles auth, RBAC, DB)
upstream api_gateway {
    least_conn;
    server api-gateway:4000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# Upstream: Next.js BFF (handles SSR, static, BFF routes)
upstream web_frontend {
    least_conn;
    server web:3000 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Ẩn version
    server_tokens off;

    # Security headers (áp dụng cho mọi response)
    add_header X-Frame-Options          "DENY"                          always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Correlation ID — gắn vào mọi request để trace
    set $req_id $http_x_request_id;
    if ($req_id = "") { set $req_id $request_id; }
    add_header X-Request-ID $req_id always;

    # ── Health check (không rate limit) ─────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","layer":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── API Gateway — tất cả /api/* ─────────────────────────
    # Auth endpoints: rate limit nghiêm ngặt (chống brute-force)
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID     $req_id;
        proxy_read_timeout 10s;
    }

    # Write endpoints: rate limit vừa (chống spam order/cart)
    location ~ ^/api/(orders|cart|payments) {
        limit_req zone=write_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID     $req_id;
        proxy_set_header   Authorization    $http_authorization;
        proxy_read_timeout 30s;
    }

    # WebSocket — Socket.IO live streaming
    location /socket.io/ {
        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;  # 1 giờ cho long-lived WebSocket
    }

    # Tất cả /api/* còn lại
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Request-ID     $req_id;
        proxy_set_header   Authorization    $http_authorization;
        proxy_read_timeout 30s;
    }

    # ── Next.js — tất cả còn lại ────────────────────────────
    location / {
        proxy_pass         http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;

        # Next.js HMR (dev hot-reload) cần lâu hơn
        proxy_buffering off;
    }
}
