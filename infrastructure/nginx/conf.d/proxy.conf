# ============================================================
# Proxy settings — included by all service location blocks
# ============================================================

proxy_http_version 1.1;

# WHY set Connection "" ?
# HTTP/1.0 default is Connection: close → new TCP per request
# Setting to empty string disables hop-by-hop connection closing
# Enables HTTP keepalive to upstreams
set $connection_upgrade "";
if ($http_upgrade) {
    set $connection_upgrade "upgrade";
}
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# Pass real client IP to services
# WHY X-Forwarded-For vs X-Real-IP?
#   X-Forwarded-For: chain of all proxy IPs (useful for multi-hop)
#   X-Real-IP: final proxy's view of client IP
#   Services use X-Forwarded-For to get original client IP
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Host $host;

# Correlation ID — inject if not present (first hop)
# Services propagate this through to Kafka events and logs
map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    ""      $request_id;
}
proxy_set_header X-Correlation-ID $correlation_id;

# Timeouts
# WHY different values than service timeout?
#   NGINX timeout < service timeout → NGINX closes first and returns 504
#   Avoids holding NGINX worker while service is stuck
proxy_connect_timeout 5s;    # Time to establish connection to upstream
proxy_send_timeout    30s;   # Time to send request to upstream
proxy_read_timeout    30s;   # Time to read response from upstream

# Buffer settings — prevent buffering issues with large responses
proxy_buffering on;
proxy_buffers 8 32k;
proxy_buffer_size 64k;
proxy_busy_buffers_size 128k;

# Hide upstream headers we don't want exposed
proxy_hide_header X-Powered-By;
proxy_hide_header Server;
proxy_hide_header X-Request-Id;  # Internal request ID — use our correlation ID

# Retry on failure (GET requests only — idempotent)
proxy_next_upstream error timeout http_502 http_503;
proxy_next_upstream_tries 2;      # Try 2 upstream instances before returning error
proxy_next_upstream_timeout 10s;
