# ============================================================
# Upstream definitions for all HYPERCOMMERCE services
#
# WHY least_conn instead of round_robin?
#   round_robin: assumes all requests equal cost → unbalanced under variable load
#   least_conn: routes to server with fewest active connections → better for
#               mixed fast (GET product) and slow (POST order + Kafka publish) requests
#
# WHY keepalive 32?
#   Without keepalive: new TCP connection per request = +1ms RTT (within same DC)
#   With keepalive 32: NGINX maintains up to 32 idle connections per upstream
#   Cost: 32 × 3 (min FDs) per upstream × 9 services ≈ negligible
# ============================================================

# ── API Gateway (Express) — single entry point for all /api/* ──
# In monolith-gateway mode: NGINX → api-gateway → PostgreSQL/Redis
# In full microservice mode: NGINX → individual services below
upstream api_gateway {
    least_conn;
    server api-gateway:4000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

# ── Next.js BFF ──────────────────────────────────────────────
upstream web_frontend {
    least_conn;
    server web:3000 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream order_upstream {
    least_conn;
    server order-service:3001   max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream payment_upstream {
    least_conn;
    server payment-service:3002 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream user_upstream {
    least_conn;
    server user-service:3003    max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream inventory_upstream {
    least_conn;
    server inventory-service:3004 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream search_upstream {
    least_conn;
    server search-service:3005  max_fails=3 fail_timeout=10s;
    keepalive 64;   # Search is high-frequency; more keepalive connections
}

upstream notification_upstream {
    least_conn;
    server notification-service:3006 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream ai_upstream {
    least_conn;
    server ai-service:3007      max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream analytics_upstream {
    least_conn;
    server analytics-service:3008 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream feed_upstream {
    least_conn;
    server feed-service:3009    max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream live_upstream {
    least_conn;
    server live-service:3010    max_fails=3 fail_timeout=10s;
    keepalive 64;   # WebSocket connections are long-lived
}

# Search response cache zone
# WHY proxy_cache instead of Redis cache here?
#   For edge caching (before business logic runs), NGINX memory/disk cache is faster
#   Redis is for shared distributed caching INSIDE the service cluster
# 512m: enough for ~200K unique 2KB search results
proxy_cache_path /var/cache/nginx/search
    levels=1:2
    keys_zone=search_cache:20m
    max_size=512m
    inactive=60s
    use_temp_path=off;
