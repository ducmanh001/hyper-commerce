# ============================================================
# Security Headers
#
# WHY add these headers at NGINX instead of application level?
#   - Applied uniformly regardless of which service handles request
#   - Services may forget to add; NGINX is the single enforcement point
#   - Reduced per-request overhead in services
# ============================================================

# Remove server version fingerprint
# WHY: Attackers use Server: nginx/1.x to target known CVEs
server_tokens off;

# X-Frame-Options: DENY
# Prevents clickjacking (embedding site in malicious iframe)
# WHY DENY not SAMEORIGIN? Payment pages must NEVER be framed
add_header X-Frame-Options "DENY" always;

# X-Content-Type-Options: nosniff
# Prevents MIME type sniffing (browser ignores Content-Type and executes based on content)
# Mitigates XSS via MIME confusion attacks
add_header X-Content-Type-Options "nosniff" always;

# X-XSS-Protection: legacy header (modern browsers have built-in XSS auditor)
# Still useful for IE 11 users
add_header X-XSS-Protection "1; mode=block" always;

# Referrer-Policy: control what's in Referer header
# WHY strict-origin-when-cross-origin?
#   Cross-origin requests: only send origin (no path/query — hides order IDs in URLs)
#   Same-origin: full URL (for analytics)
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content-Security-Policy
# WHY CSP instead of relying on browser defaults?
#   XSS mitigation: even if attacker injects <script>, CSP blocks execution
#   WHY 'nonce' not 'unsafe-inline'?
#   - 'unsafe-inline' defeats the purpose of CSP
#   - nonce: each response gets unique token, inline scripts must include it
add_header Content-Security-Policy "
    default-src 'self';
    script-src 'self' 'nonce-$request_id' https://js.stripe.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https://cdn.hypercommerce.vn https://*.cloudfront.net;
    font-src 'self' data:;
    connect-src 'self' https://api.hypercommerce.vn wss://api.hypercommerce.vn;
    frame-src https://js.stripe.com;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
    upgrade-insecure-requests;
" always;

# Permissions-Policy (formerly Feature-Policy)
# Disable APIs that could be abused
# WHY explicitly disable? Some APIs (geolocation, camera) can be enabled via CORS
add_header Permissions-Policy "
    geolocation=(),
    microphone=(),
    camera=(),
    payment=(self https://js.stripe.com),
    usb=(),
    magnetometer=(),
    gyroscope=()
" always;

# Cross-Origin policies
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;

# ============================================================
# Block suspicious patterns (basic WAF rules)
#
# WHY NGINX rules instead of ModSecurity?
#   These are lightweight string matches — no overhead
#   ModSecurity handles complex regex/multi-stage attacks
#   Together: fast pre-filter + full WAF
# ============================================================

# Block SQL injection patterns in query strings
if ($args ~* "(union|select|insert|update|delete|drop|truncate|alter|exec|declare|cast|convert)\s") {
    return 403;
}

# Block path traversal
if ($request_uri ~* "(\.\./|\.\.%2F|%2E%2E/)") {
    return 403;
}

# Block common exploit scanners (Nikto, sqlmap, DirBuster)
if ($http_user_agent ~* "(nikto|sqlmap|dirbuster|nmap|masscan|zgrab|nuclei|acunetix|nessus)") {
    return 403;
}

# Reject requests without User-Agent (bots, scripts)
if ($http_user_agent = "") {
    return 403;
}
