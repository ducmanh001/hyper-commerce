# =============================================================================
# CI — Quality Gate
# Mirrors every check that Husky runs locally, so failures are caught BEFORE
# the developer pushes (pre-push hook) and again on the server as a safety net.
#
# Branch Protection: require status check "CI Pass ✓" from this workflow.
# =============================================================================

name: CI — Quality Gate

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'hotfix/**', 'chore/**']
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel in-progress run on the same branch when a new commit is pushed.
# Saves CI minutes and gives faster feedback.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── 1. Lint (ESLint) ────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint:check

  # ── 2. TypeScript type check ────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tsc --noEmit
        run: npm run type-check

  # ── 3. Prettier format check ────────────────────────────────────────────────
  format:
    name: Format Check (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check formatting
        run: npm run format:check

  # ── 4. Unit tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hypercommerce_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/hypercommerce_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_ci_only
          KAFKA_BROKERS: localhost:9092

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        continue-on-error: true # don't fail CI if Codecov is down
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── 5. Build check (TypeScript → JS, no Docker) ─────────────────────────────
  # Verifies that nest build compiles successfully for the most critical services.
  # Full Docker image builds are handled by ci.yml on main/develop only.
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, typecheck] # skip expensive build if lint/types fail
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build critical services
        run: |
          npm run build:user
          npm run build:order
          npm run build:payment

  # ── 6. npm audit (high-severity vulnerabilities) ────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: npm audit (high+)
        run: npm audit --audit-level=high --omit=dev

  # ── 7. Final gate — this is the ONLY required status check needed ────────────
  # Configure Branch Protection: Required status check = "CI Pass ✓"
  ci-pass:
    name: CI Pass ✓
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, typecheck, format, test, build-check, security]
    steps:
      - name: Evaluate all job results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: $results"
          if echo "$results" | grep -qE 'failure|cancelled'; then
            echo "❌ One or more CI checks failed — merge is blocked."
            exit 1
          fi
          echo "✅ All CI checks passed."
